# Default LoRA experiment configuration
lora:
  rank: 8
  alpha: 16.0
  dropout: 0.0
  target_modules:
    - c_attn
    - c_proj

train:
  model_name: gpt2
  dataset: wikitext
  dataset_config: wikitext-2-raw-v1
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  num_epochs: 3
  warmup_steps: 100
  max_seq_length: 512
  seed: 42
  output_dir: results/checkpoints
  log_every: 50
  eval_every: 500
  save_every: 1000
